name: flutter_todo_reminder
description: A local-first reminder-focused task app built with Flutter.
publish_to: 'none'
version: 0.1.2+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.0
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  workmanager: ^0.9.0+3
  intl: ^0.20.2
  uuid: ^4.5.3
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.10.1
  drift_dev: ^2.32.1
  flutter_lints: ^6.0.0

hooks:
  user_defines:
    sqlite3:
      source: system
      name: sqlite3

flutter:
  uses-material-design: true
